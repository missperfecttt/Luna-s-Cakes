<!-- Chat Button -->
<div id="chatButton">
    💬
</div>

<!-- Chat Window -->
<div id="chatWindow">

    <div class="chat-header">
        Luna's Cakes Assistant 🍰
    </div>

    <div id="chatMessages">

        <div class="bot-message">
            Hi! 👋 Welcome to Luna's Cakes.
            <br><br>
            Ask me things like:
            <br>
            • Cake prices
            <br>
            • Delivery
            <br>
            • Flavours
            <br>
            • Payment
        </div>

    </div>

    <div class="chat-input">

        <input
            id="userInput"
            type="text"
            placeholder="Type your question..."
        >

        <button id="sendBtn">
            Send
        </button>

    </div>

</div>
