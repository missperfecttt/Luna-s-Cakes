    <div id="chatMessages">

            👋 Hello!

            <br><br>

            I'm Luna's Cake Assistant.

            <br><br>

            Ask me things like:

            <br>• Cake prices

            <br>• Working hours

    </div>

    <div id="chatInputArea">

            id="chatInput"
            placeholder="Ask me anything..."

        <button id="sendBtn">
            ➤
        </button>

    </div>

</div>
