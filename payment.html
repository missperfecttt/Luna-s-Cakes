<!DOCTYPE html>
<html>

<head>

<title>Payment Verification</title>

<link rel="stylesheet" href="payment.css">

</head>


<body>


<div class="payment-box">


<h1>Payment Verification</h1>


<h3>Select Payment Method</h3>


<div class="payment-options">


<button class="payment-card" id="telebirrBtn">

<img src="Telebirr Logo.jpg">

<p>Telebirr</p>

</button>



<button class="payment-card" id="cbeBtn">

<img src="CBE Logo.jpg">

<p>CBE</p>

</button>


</div>



<div id="paymentDetails" class="details">


<p>Select a payment method above</p>


</div>




<form id="paymentForm">


<input 
id="name"
type="text"
placeholder="Full Name"
required>



<input 
id="phone"
type="tel"
placeholder="Phone Number"
required>




<input 
id="paymentScreenshot"
type="file"
accept="image/*"
required>



<button id="submitBtn" type="submit">

Submit Verification

</button>



</form>


</div>



<script src="payment.js"></script>


</body>

</html>
